apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirereadonlyrootfs
spec:
  crd:
    spec:
      names:
        kind: K8sRequireReadOnlyRootFS
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirereadonlyrootfs

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not c.securityContext.readOnlyRootFilesystem
          msg := sprintf("readOnlyRootFilesystem=true is required for container %q", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          not c.securityContext.readOnlyRootFilesystem
          msg := sprintf("readOnlyRootFilesystem=true is required for initContainer %q", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.ephemeralContainers[_]
          not c.securityContext.readOnlyRootFilesystem
          msg := sprintf("readOnlyRootFilesystem=true is required for ephemeralContainer %q", [c.name])
        }
