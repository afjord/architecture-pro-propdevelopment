apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowprivileged
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowPrivileged
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowprivileged

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          c.securityContext.privileged == true
          msg := sprintf("privileged=true is forbidden for container %q", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          c.securityContext.privileged == true
          msg := sprintf("privileged=true is forbidden for initContainer %q", [c.name])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.ephemeralContainers[_]
          c.securityContext.privileged == true
          msg := sprintf("privileged=true is forbidden for ephemeralContainer %q", [c.name])
        }
